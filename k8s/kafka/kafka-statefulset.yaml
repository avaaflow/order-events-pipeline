# Kafka uses StatefulSet because:
# 1) Stable pod identity (kafka-0) for KRaft voters and advertised listeners
# 2) Ordered start/stop for broker lifecycle
# 3) (Production) volumeClaimTemplates give each pod its own durable disk
#
# LAB: emptyDir instead of PVC (no persistent storage required for demos).
# Data is lost on pod restart. For production, uncomment volumeClaimTemplates
# below and remove the emptyDir volumes section.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          # Prefer a mirrored image in air-gapped clusters:
          # image: your-registry/apache/kafka:3.8.0
          image: apache/kafka:3.8.0
          ports:
            - name: plaintext
              containerPort: 9092
              protocol: TCP
            - name: controller
              containerPort: 9093
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kafka-config
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: data
          emptyDir: {}
