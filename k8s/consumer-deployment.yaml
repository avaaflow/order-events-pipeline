# Deployment manages replicas of the Kafka → ClickHouse consumer.
# Scale replicas to match Kafka partitions (3) for parallel consume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-consumer
  labels:
    app: clickhouse-consumer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clickhouse-consumer
  template:
    metadata:
      labels:
        app: clickhouse-consumer
    spec:
      containers:
        - name: consumer
          image: repo-nexus.kavosh.org:8100/order-events-consumer:1.0
          # Dockerfile has no CMD — without this the container exits 0 immediately (CrashLoopBackOff).
          workingDir: /app
          command: ["python", "consumers/clickhouse_sink.py"]
          ports:
            - name: metrics
              containerPort: 8000
          # ConfigMap provides runtime configuration (Kafka, ClickHouse, batch, metrics port).
          env:
            - name: PYTHONPATH
              value: "/app"
          envFrom:
            - configMapRef:
                name: consumer-config
