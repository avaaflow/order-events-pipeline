# Deployment manages replicas of the Kafka → ClickHouse consumer.
# Scale replicas to match Kafka partitions (3) for parallel consume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-consumer
  labels:
    app: clickhouse-consumer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clickhouse-consumer
  template:
    metadata:
      labels:
        app: clickhouse-consumer
    spec:
      containers:
        - name: consumer
          # Replace with your registry before deploying
          image: your-registry/order-events-consumer:1.0
          workingDir: /app
          command: ["python", "consumers/clickhouse_sink.py"]
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: PYTHONPATH
              value: "/app"
          envFrom:
            - configMapRef:
                name: consumer-config
